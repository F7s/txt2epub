<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>txt2epub</title>
    <script>
      // SPA 路由处理：将所有路径重定向到 index.html
      // 对于 https://f7s.github.io/txt2epub/converter
      // 路径是 /txt2epub/converter，需要保留 /txt2epub
      var pathSegmentsToKeep = 2; // 保留 /txt2epub（空字符串 + txt2epub）
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, pathSegmentsToKeep).join('/') +
        '/?/' +
        l.pathname.split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
        (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body>
    <p>Redirecting...</p>
  </body>
</html>
